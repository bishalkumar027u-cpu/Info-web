<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SILENT FF | Ultimate Player Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow-x: hidden;
        }

        /* ========== ANIMATED GLASS BACKGROUND ========== */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 30%, #16213e 60%, #0f0f1a 100%);
        }

        .bg-gradient::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(255,71,87,0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.1) 0%, transparent 45%),
                        radial-gradient(circle at 40% 80%, rgba(255, 200, 0, 0.08) 0%, transparent 50%);
            animation: slowDrift 25s ease infinite;
        }

        @keyframes slowDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-2%, -1.5%) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* ========== FLOATING PARTICLES ========== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, #ff4757, transparent);
            border-radius: 50%;
            opacity: 0.3;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-20vh) scale(1); opacity: 0; }
        }

        /* ========== CUSTOM SCROLLBAR ========== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #ff4757, #ff6b81); border-radius: 10px; }

        /* ========== GLASS NAVBAR ========== */
        .navbar {
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            background: rgba(10, 10, 20, 0.4);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 34px;
            animation: logoPulse 2s infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px #ff4757; }
            50% { transform: scale(1.08); text-shadow: 0 0 25px #ff4757, 0 0 35px #ff6b81; }
        }

        .logo-text {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff4757, #ff6b81, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .logo-text span {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 28px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            opacity: 0.7;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after { width: 100%; }
        .nav-links a:hover { opacity: 1; }

        /* ========== HERO SECTION ========== */
        .hero {
            text-align: center;
            padding: 55px 20px 40px;
        }

        .hero h1 {
            font-size: 54px;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ffffff, #ff4757, #ff6b81, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% auto;
            animation: heroGradient 4s ease infinite;
        }

        @keyframes heroGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero p {
            color: rgba(255,255,255,0.6);
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        /* ========== SEARCH BOX ========== */
        .search-container {
            max-width: 580px;
            margin: 0 auto 45px;
            padding: 0 20px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.04);
            border-radius: 70px;
            padding: 6px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: #ff4757;
            box-shadow: 0 0 25px rgba(255,71,87,0.35);
            background: rgba(255,255,255,0.07);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 26px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.4);
            font-weight: 400;
        }

        .search-box button {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            padding: 12px 36px;
            border-radius: 60px;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(255,71,87,0.4);
        }

        /* ========== GLASS TABS ========== */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 35px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 32px;
            border-radius: 50px;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .tab-btn i { font-size: 16px; }

        .tab-btn:hover {
            background: rgba(255,71,87,0.15);
            border-color: rgba(255,71,87,0.4);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border-color: transparent;
            box-shadow: 0 5px 20px rgba(255,71,87,0.3);
        }

        /* ========== LOADER ========== */
        .loader {
            display: none;
            text-align: center;
            padding: 60px;
        }

        .loader.active { display: block; }

        .spinner {
            width: 55px;
            height: 55px;
            border: 3px solid rgba(255,71,87,0.2);
            border-top: 3px solid #ff4757;
            border-right: 3px solid #ff6b81;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 18px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        /* ========== GLASS RESULT CARDS ========== */
        .result-card {
            max-width: 800px;
            margin: 0 auto 30px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            animation: slideUpFade 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transition: all 0.3s ease;
        }

        .result-card:hover {
            border-color: rgba(255,71,87,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            background: linear-gradient(135deg, rgba(255,71,87,0.12), rgba(255,107,129,0.04));
            padding: 22px 28px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-title i {
            color: #ff4757;
            font-size: 26px;
        }

        .card-subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            margin-top: 8px;
            font-family: monospace;
        }

        /* ========== INFO GRID ========== */
        .info-grid {
            padding: 22px 25px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .info-item {
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
            padding: 14px 18px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .info-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(4px);
            border-color: rgba(255,71,87,0.2);
        }

        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            word-break: break-word;
        }

        /* ========== PROGRESS BAR ========== */
        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            height: 6px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            height: 100%;
            border-radius: 12px;
            width: 0%;
            transition: width 0.6s ease;
        }

        /* ========== BADGES ========== */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-success { background: rgba(0,255,136,0.15); color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
        .badge-danger { background: rgba(255,71,87,0.15); color: #ff4757; border: 1px solid rgba(255,71,87,0.3); }
        .badge-warning { background: rgba(255,165,0,0.15); color: #ffa502; border: 1px solid rgba(255,165,0,0.3); }
        .badge-info { background: rgba(0,210,255,0.15); color: #00d2ff; border: 1px solid rgba(0,210,255,0.3); }

        /* ========== JSON VIEWER ========== */
        .json-viewer {
            padding: 20px 25px;
            max-height: 500px;
            overflow: auto;
        }

        .json-viewer pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 18px;
            border-radius: 20px;
            overflow-x: auto;
            font-size: 12px;
            font-family: 'Fira Code', 'Courier New', monospace;
            color: #00ffaa;
            line-height: 1.5;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ========== ACTION BUTTONS ========== */
        .action-buttons {
            display: flex;
            gap: 12px;
            padding: 0 25px 22px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 12px 18px;
            border-radius: 50px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }

        .btn-outline:hover {
            border-color: #ff4757;
            background: rgba(255,71,87,0.1);
            transform: translateY(-2px);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,71,87,0.3);
        }

        /* ========== INPUT GROUP (TOKEN) ========== */
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 14px 20px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .input-group input:focus {
            border-color: #ff4757;
            box-shadow: 0 0 15px rgba(255,71,87,0.2);
        }

        /* ========== ERROR MESSAGE ========== */
        .error-message {
            max-width: 550px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(255,71,87,0.12);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 24px;
            text-align: center;
            color: #ff6b81;
            backdrop-filter: blur(10px);
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: 35px;
            color: rgba(255,255,255,0.35);
            font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.04);
            margin-top: 50px;
        }

        .footer a {
            color: #ff4757;
            text-decoration: none;
            transition: 0.3s;
        }

        .footer a:hover { text-decoration: underline; }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 650px) {
            .navbar { padding: 15px 20px; }
            .logo-text { font-size: 18px; }
            .logo-icon { font-size: 26px; }
            .nav-links { gap: 15px; }
            .hero h1 { font-size: 32px; }
            .hero p { font-size: 14px; }
            .search-box { flex-direction: column; border-radius: 30px; padding: 15px; }
            .search-box button { padding: 12px; }
            .tab-btn { padding: 8px 20px; font-size: 13px; }
            .info-grid { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">🔥</span>
            <span class="logo-text">SILENT <span>FF</span></span>
        </div>
        <div class="nav-links">
            <a href="#" onclick="showTab('info')"><i class="fas fa-user"></i> Info</a>
            <a href="#" onclick="showTab('ban')"><i class="fas fa-shield-alt"></i> Ban Check</a>
            <a href="#" onclick="showTab('token')"><i class="fas fa-key"></i> Token</a>
            <a href="https://t.me/SILENT_METHODE" target="_blank"><i class="fab fa-telegram"></i> Channel</a>
        </div>
    </nav>

    <!-- ========== HERO ========== -->
    <div class="hero">
        <h1>Free Fire Player Stats</h1>
        <p>Enter any UID to get instant player information from SILENT API</p>
    </div>

    <!-- ========== SEARCH ========== -->
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="uidInput" placeholder="Enter UID (e.g., 13599330571)" onkeypress="if(event.key==='Enter') searchPlayerInfo()">
            <button onclick="searchPlayerInfo()"><i class="fas fa-search"></i> Search Player</button>
        </div>
    </div>

    <!-- ========== TABS ========== -->
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('info')"><i class="fas fa-user-circle"></i> Player Info</button>
        <button class="tab-btn" onclick="showTab('ban')"><i class="fas fa-shield-alt"></i> Ban Check</button>
        <button class="tab-btn" onclick="showTab('token')"><i class="fas fa-key"></i> Token Generator</button>
    </div>

    <!-- ========== LOADER ========== -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p><i class="fas fa-sync-alt fa-spin"></i> Fetching data from SILENT API...</p>
    </div>

    <!-- ========== RESULT CONTAINERS ========== -->
    <div id="infoResult"></div>
    <div id="banResult" class="hidden"></div>
    <div id="tokenResult" class="hidden"></div>

    <!-- ========== FOOTER ========== -->
    <div class="footer">
        <p>🔥 Powered by <strong>SILENT API NETWORK</strong> | 📢 Channel: <a href="https://t.me/SILENT_METHODE" target="_blank">@SILENT_METHODE</a></p>
        <p>👨‍💻 Developer: <a href="https://t.me/SIL3NT_KILLER" target="_blank">@SILENT_RDP</a></p>
    </div>

    <script>
        // ======================== PARTICLE GENERATION ========================
        function createParticles() {
            const container = document.getElementById('particles');
            for(let i = 0; i < 80; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 5 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = 6 + Math.random() * 12 + 's';
                p.style.animationDelay = Math.random() * 15 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        let currentUid = '';

        // ======================== UTILITY FUNCTIONS ========================
        function escapeHtml(str) {
            if(!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        function formatNumber(num) {
            if(num === undefined || num === null) return 'N/A';
            let n = parseInt(num);
            if(isNaN(n)) return num;
            return n.toLocaleString();
        }

        function formatDate(timestamp) {
            if(!timestamp || timestamp === '0') return 'N/A';
            let date = new Date(parseInt(timestamp) * 1000);
            if(isNaN(date.getTime())) return 'N/A';
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function formatDateTime(timestamp) {
            if(!timestamp || timestamp === '0') return 'N/A';
            let date = new Date(parseInt(timestamp) * 1000);
            if(isNaN(date.getTime())) return 'N/A';
            return date.toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function getRankFromPoints(points, mode) {
            let p = parseInt(points) || 0;
            if(mode === 'br') {
                if(p < 1000) return 'Bronze';
                if(p < 2000) return 'Silver';
                if(p < 3000) return 'Gold';
                if(p < 4000) return 'Platinum';
                if(p < 5000) return 'Diamond';
                if(p < 6000) return 'Heroic';
                if(p < 7000) return 'Mythic';
                return 'Grandmaster';
            } else {
                if(p < 20) return 'Bronze I';
                if(p < 40) return 'Bronze II';
                if(p < 60) return 'Silver I';
                if(p < 80) return 'Silver II';
                if(p < 100) return 'Gold I';
                if(p < 120) return 'Gold II';
                if(p < 140) return 'Gold III';
                return 'Elite';
            }
        }

        function getCreditInfo(score) {
            let s = parseInt(score) || 0;
            if(s >= 90) return { emoji: '🟢', class: 'badge-success', text: 'Excellent' };
            if(s >= 70) return { emoji: '🟡', class: 'badge-warning', text: 'Good' };
            if(s >= 50) return { emoji: '🟠', class: 'badge-warning', text: 'Fair' };
            return { emoji: '🔴', class: 'badge-danger', text: 'Poor' };
        }

        // ======================== TAB MANAGEMENT ========================
        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            const tabs = ['info', 'ban', 'token'];
            tabs.forEach(tab => {
                document.getElementById(tab + 'Result').classList.add('hidden');
            });
            
            if(tabName === 'info') document.querySelector('.tabs button:nth-child(1)').classList.add('active');
            if(tabName === 'ban') document.querySelector('.tabs button:nth-child(2)').classList.add('active');
            if(tabName === 'token') document.querySelector('.tabs button:nth-child(3)').classList.add('active');
            
            document.getElementById(tabName + 'Result').classList.remove('hidden');
            
            if(tabName === 'ban' && currentUid) fetchBanStatus(currentUid);
            if(tabName === 'token') showTokenForm();
        }

        // ======================== MAIN SEARCH - PLAYER INFO ========================
        async function searchPlayerInfo() {
            const uid = document.getElementById('uidInput').value.trim();
            if(!uid) {
                showError('Please enter a valid UID', 'infoResult');
                return;
            }
            if(!/^\d{8,11}$/.test(uid)) {
                showError('Invalid UID! Must be 8-11 digits only', 'infoResult');
                return;
            }
            
            currentUid = uid;
            
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('infoResult');
            
            loader.classList.add('active');
            resultDiv.innerHTML = '';
            
            try {
                const infoRes = await fetch(`https://mafuuuu-info-api.vercel.app/mafu-info?uid=${uid}`);
                const infoData = await infoRes.json();
                displayPlayerInfoComplete(infoData, uid);
            } catch(error) {
                showError(`API Error: ${error.message}`, 'infoResult');
            } finally {
                loader.classList.remove('active');
            }
        }
        
        function displayPlayerInfoComplete(data, uid) {
            const resultDiv = document.getElementById('infoResult');
            
            const basic = data.basicInfo || {};
            const clan = data.clanBasicInfo || {};
            const credit = data.creditScoreInfo || {};
            const social = data.socialInfo || {};
            
            const name = basic.nickname || 'Unknown';
            const region = basic.region || 'N/A';
            const level = basic.level || 'N/A';
            const exp = basic.exp || '0';
            const likes = basic.liked || '0';
            const title = basic.title || 'No Title';
            const brPoints = basic.rankingPoints || '0';
            const csPoints = basic.csRankingPoints || '0';
            const creditScore = credit.creditScore || '0';
            const created = basic.createAt || '0';
            const lastLogin = basic.lastLoginAt || '0';
            const signature = social.signature || 'No bio set';
            const guildName = clan.clanName || 'No Guild';
            const guildLevel = clan.clanLevel || 'N/A';
            const guildMembers = clan.memberNum || '0';
            
            const brRank = getRankFromPoints(brPoints, 'br');
            const csRank = getRankFromPoints(csPoints, 'cs');
            const creditInfo = getCreditInfo(creditScore);
            const expProgress = (parseInt(exp) % 50000) / 50000 * 100;
            const brProgress = Math.min(100, (parseInt(brPoints) / 7000) * 100);
            const csProgress = Math.min(100, (parseInt(csPoints) / 150) * 100);
            
            const rawJson = JSON.stringify(data, null, 2);
            
            const html = `
                <div class="result-card">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-user"></i> ${escapeHtml(name)}
                            <span class="badge badge-info">Level ${level}</span>
                        </div>
                        <div class="card-subtitle">
                            <i class="fas fa-id-card"></i> UID: ${uid} | 
                            <i class="fas fa-globe"></i> Region: ${region.toUpperCase()}
                        </div>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-trophy"></i> BR RANK</div>
                            <div class="info-value">${brRank}</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${brProgress}%"></div></div>
                            <div style="font-size:11px; color:#aaa; margin-top:5px;">${formatNumber(brPoints)} points</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-gamepad"></i> CS RANK</div>
                            <div class="info-value">${csRank}</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${csProgress}%"></div></div>
                            <div style="font-size:11px; color:#aaa; margin-top:5px;">${formatNumber(csPoints)} points</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-heart"></i> LIKES RECEIVED</div>
                            <div class="info-value">${formatNumber(likes)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-credit-card"></i> CREDIT SCORE</div>
                            <div class="info-value"><span class="badge ${creditInfo.class}">${creditInfo.emoji} ${creditScore} (${creditInfo.text})</span></div>
                        </div>
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-chart-line"></i> EXPERIENCE</div>
                            <div class="info-value">${formatNumber(exp)} XP</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${expProgress}%"></div></div>
                        </div>
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-calendar"></i> ACCOUNT CREATED</div>
                            <div class="info-value">${formatDate(created)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-clock"></i> LAST LOGIN</div>
                            <div class="info-value">${formatDateTime(lastLogin)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-flag"></i> TITLE</div>
                            <div class="info-value" style="font-size:14px;">${escapeHtml(title)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-signature"></i> SIGNATURE</div>
                            <div class="info-value" style="font-size:13px;">${escapeHtml(signature)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-building"></i> GUILD</div>
                            <div class="info-value">${escapeHtml(guildName)}</div>
                            <div style="font-size:11px; color:#aaa;">Level ${guildLevel} | ${guildMembers} members</div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="fetchOutfitImage('${uid}', '${region}')">
                            <i class="fas fa-tshirt"></i> Show Outfit
                        </button>
                        <button class="btn btn-outline" onclick="fetchBannerImage('${uid}')">
                            <i class="fas fa-image"></i> Show Banner
                        </button>
                    </div>
                </div>
                
                <div class="result-card">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-code"></i> Raw API Response
                        </div>
                        <div class="card-subtitle">Complete JSON data from mafuuu-info-api</div>
                    </div>
                    <div class="json-viewer">
                        <pre>${escapeHtml(rawJson)}</pre>
                    </div>
                </div>
            `;
            
            resultDiv.innerHTML = html;
        }
        
        // ======================== OUTFIT & BANNER ========================
        async function fetchOutfitImage(uid, region) {
            const regionLower = (region || 'ind').toLowerCase();
            const url = `https://silent-outfit-api.vercel.app/outfit-image?uid=${uid}&region=${regionLower}&key=SILENT`;
            
            const resultDiv = document.getElementById('infoResult');
            const outfitDiv = document.createElement('div');
            outfitDiv.className = 'result-card';
            outfitDiv.innerHTML = `
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-tshirt"></i> Player Outfit</div>
                    <div class="card-subtitle">UID: ${uid} | Region: ${regionLower}</div>
                </div>
                <div style="padding:20px; text-align:center;">
                    <img src="${url}" style="max-width:100%; border-radius:20px;" onerror="this.src='https://placehold.co/500x300?text=Outfit+Not+Found'">
                </div>
            `;
            resultDiv.appendChild(outfitDiv);
            outfitDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        
        async function fetchBannerImage(uid) {
            const url = `https://banner-views-pink.vercel.app/profile?uid=${uid}`;
            
            const resultDiv = document.getElementById('infoResult');
            const bannerDiv = document.createElement('div');
            bannerDiv.className = 'result-card';
            bannerDiv.innerHTML = `
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-image"></i> Player Banner</div>
                    <div class="card-subtitle">UID: ${uid}</div>
                </div>
                <div style="padding:20px; text-align:center;">
                    <img src="${url}" style="max-width:100%; border-radius:20px;" onerror="this.src='https://placehold.co/500x200?text=Banner+Not+Found'">
                </div>
            `;
            resultDiv.appendChild(bannerDiv);
            bannerDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        
        // ======================== BAN CHECK (WORKING) ========================
        async function fetchBanStatus(uid) {
            const container = document.getElementById('banResult');
            container.innerHTML = '<div class="loader active" style="padding:20px;"><div class="spinner"></div><p>Checking ban status...</p></div>';
            
            try {
                const res = await fetch(`https://silent-bancheck-api.vercel.app/bancheck?uid=${uid}`);
                const data = await res.json();
                const jsonString = JSON.stringify(data, null, 2);
                
                container.innerHTML = `
                    <div class="result-card">
                        <div class="card-header">
                            <div class="card-title"><i class="fas fa-shield-alt"></i> Ban Check API Response</div>
                            <div class="card-subtitle">📱 UID: ${uid}</div>
                        </div>
                        <div class="json-viewer">
                            <pre>${escapeHtml(jsonString)}</pre>
                        </div>
                    </div>
                `;
            } catch(e) {
                container.innerHTML = `<div class="error-message">❌ Ban Check Failed: ${e.message}</div>`;
            }
        }
        
        // ======================== TOKEN GENERATOR (WORKING) ========================
        function showTokenForm() {
            const container = document.getElementById('tokenResult');
            container.innerHTML = `
                <div class="result-card">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-key"></i> JWT Token Generator</div>
                        <div class="card-subtitle">Generate access token using UID and password</div>
                    </div>
                    <div style="padding:22px 25px;">
                        <div class="input-group">
                            <label><i class="fas fa-id-card"></i> UID</label>
                            <input type="text" id="tokenUid" placeholder="Enter UID">
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="tokenPass" placeholder="Enter Password">
                        </div>
                        <button class="btn btn-primary" onclick="generateToken()" style="width:100%;">
                            <i class="fas fa-key"></i> Generate Token
                        </button>
                    </div>
                    <div id="tokenOutput"></div>
                </div>
            `;
        }
        
        async function generateToken() {
            const uid = document.getElementById('tokenUid')?.value.trim();
            const password = document.getElementById('tokenPass')?.value.trim();
            const output = document.getElementById('tokenOutput');
            
            if(!uid || !password) {
                output.innerHTML = `<div class="error-message">⚠️ Please enter both UID and Password</div>`;
                return;
            }
            
            output.innerHTML = '<div class="loader active" style="padding:20px;"><div class="spinner"></div><p>Generating token...</p></div>';
            
            try {
                const res = await fetch(`https://uid-password-to-jwt-f1uw.vercel.app/token?uid=${uid}&password=${password}`);
                const data = await res.json();
                const jsonString = JSON.stringify(data, null, 2);
                
                output.innerHTML = `
                    <div class="json-viewer">
                        <pre>${escapeHtml(jsonString)}</pre>
                    </div>
                `;
            } catch(e) {
                output.innerHTML = `<div class="error-message">❌ Token Generation Failed: ${e.message}</div>`;
            }
        }
        
        // ======================== ERROR HANDLER ========================
        function showError(msg, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${escapeHtml(msg)}</div>`;
            setTimeout(() => {
                if(container.innerHTML.includes(msg)) container.innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
