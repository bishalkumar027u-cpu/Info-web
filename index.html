<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SILENT FF | Player Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Navbar */
        .navbar {
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 800;
        }

        .logo i {
            color: #ff4757;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 5px #ff4757; }
            50% { text-shadow: 0 0 20px #ff4757; }
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            opacity: 0.7;
            transition: 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
            color: #ff4757;
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 50px 20px 35px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ff4757);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: rgba(255,255,255,0.6);
            margin-top: 10px;
        }

        /* Search Box */
        .search-container {
            max-width: 500px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            padding: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 20px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .search-box button {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-box button:hover {
            transform: scale(1.02);
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 25px;
            border-radius: 30px;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn:hover, .tab-btn.active {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border-color: transparent;
        }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(255,71,87,0.2);
            border-top-color: #ff4757;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result Box */
        .result-box {
            max-width: 700px;
            margin: 0 auto 25px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            border: 1px solid rgba(255,71,87,0.3);
            overflow: hidden;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            background: rgba(255,71,87,0.1);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,71,87,0.2);
        }

        .result-header h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
        }

        .result-content {
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #00ffaa;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .result-content pre {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #00ffaa;
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            padding: 20px;
        }

        .info-card {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 12px 15px;
            transition: 0.2s;
        }

        .info-card:hover {
            background: rgba(255,255,255,0.08);
        }

        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 15px;
            font-weight: 600;
            word-break: break-word;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
        .badge-success { background: rgba(0,255,136,0.15); color: #00ff88; }
        .badge-danger { background: rgba(255,71,87,0.15); color: #ff4757; }
        .badge-info { background: rgba(0,210,255,0.15); color: #00d2ff; }

        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            height: 4px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            height: 100%;
            width: 0%;
            transition: width 0.5s;
        }

        /* Form */
        .token-form {
            padding: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: rgba(255,255,255,0.7);
        }
        .input-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 15px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #ff4757;
        }
        .gen-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .error-msg {
            padding: 15px;
            background: rgba(255,71,87,0.15);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 12px;
            text-align: center;
            color: #ff6b81;
            margin: 20px;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 40px;
        }

        .footer a {
            color: #ff4757;
            text-decoration: none;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .navbar { padding: 15px 20px; }
            .hero h1 { font-size: 32px; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-fire"></i> SILENT FF</div>
        <div class="nav-links">
            <a href="#" onclick="showTab('info')">Info</a>
            <a href="#" onclick="showTab('ban')">Ban Check</a>
            <a href="#" onclick="showTab('token')">Token</a>
            <a href="https://t.me/SILENT_GAM3R" target="_blank">Channel</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Free Fire Player Stats</h1>
        <p>Enter UID to get instant information</p>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="uidInput" placeholder="Enter UID (e.g., 6892779978)" onkeypress="if(event.key==='Enter') searchPlayer()">
            <button onclick="searchPlayer()"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('info')">📊 Player Info</button>
        <button class="tab-btn" onclick="showTab('ban')">🛡️ Ban Check</button>
        <button class="tab-btn" onclick="showTab('token')">🔑 Token Generator</button>
    </div>

    <div class="loader" id="loader"><div class="spinner"></div><p>Fetching data...</p></div>

    <div id="infoResult"></div>
    <div id="banResult" class="hidden"></div>
    <div id="tokenResult" class="hidden"></div>

    <div class="footer">
        <p>🔥 Powered by SILENT API | 📢 <a href="https://t.me/SILENT_GAM3R" target="_blank">@SILENT_GAM3R</a></p>
        <p>👨‍💻 Developer: <a href="https://t.me/SIL3NT_KILLER" target="_blank">@SIL3NT_KILLER</a></p>
    </div>

    <script>
        // CORS Proxy (free, no CORS issues)
        const CORS_PROXY = "https://cors-anywhere.herokuapp.com/";
        let currentUid = '';

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('infoResult').classList.add('hidden');
            document.getElementById('banResult').classList.add('hidden');
            document.getElementById('tokenResult').classList.add('hidden');
            
            if(tab === 'info') {
                document.querySelector('.tabs button:nth-child(1)').classList.add('active');
                document.getElementById('infoResult').classList.remove('hidden');
            } else if(tab === 'ban') {
                document.querySelector('.tabs button:nth-child(2)').classList.add('active');
                document.getElementById('banResult').classList.remove('hidden');
                if(currentUid) fetchBanCheck(currentUid);
            } else if(tab === 'token') {
                document.querySelector('.tabs button:nth-child(3)').classList.add('active');
                document.getElementById('tokenResult').classList.remove('hidden');
                showTokenForm();
            }
        }

        // ========== PLAYER INFO ==========
        async function searchPlayer() {
            const uid = document.getElementById('uidInput').value.trim();
            if(!uid) { showError('Please enter UID', 'infoResult'); return; }
            if(!/^\d{8,11}$/.test(uid)) { showError('Invalid UID! 8-11 digits', 'infoResult'); return; }
            
            currentUid = uid;
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('infoResult');
            
            loader.classList.add('active');
            resultDiv.innerHTML = '';
            resultDiv.classList.remove('hidden');
            
            try {
                const res = await fetch(`${CORS_PROXY}https://mafuuuu-info-api.vercel.app/mafu-info?uid=${uid}`);
                const data = await res.json();
                displayPlayerInfo(data, uid);
            } catch(err) {
                showError('Failed to fetch: ' + err.message, 'infoResult');
            } finally {
                loader.classList.remove('active');
            }
        }

        function displayPlayerInfo(data, uid) {
            const basic = data.basicInfo || {};
            const clan = data.clanBasicInfo || {};
            const credit = data.creditScoreInfo || {};
            const social = data.socialInfo || {};
            
            const name = basic.nickname || 'Unknown';
            const region = basic.region || 'N/A';
            const level = basic.level || 'N/A';
            const exp = basic.exp || '0';
            const likes = basic.liked || '0';
            const brPoints = basic.rankingPoints || '0';
            const csPoints = basic.csRankingPoints || '0';
            const creditScore = credit.creditScore || '0';
            const created = basic.createAt || '0';
            const signature = social.signature || 'No bio';
            const guild = clan.clanName || 'No Guild';
            
            // Calculate ranks
            let brRank = 'Bronze';
            let br = parseInt(brPoints);
            if(br >= 1000) brRank = 'Silver';
            if(br >= 2000) brRank = 'Gold';
            if(br >= 3000) brRank = 'Platinum';
            if(br >= 4000) brRank = 'Diamond';
            if(br >= 5000) brRank = 'Heroic';
            if(br >= 6000) brRank = 'Mythic';
            if(br >= 7000) brRank = 'Grandmaster';
            
            let csRank = 'Bronze I';
            let cs = parseInt(csPoints);
            if(cs >= 20) csRank = 'Bronze II';
            if(cs >= 40) csRank = 'Silver I';
            if(cs >= 60) csRank = 'Silver II';
            if(cs >= 80) csRank = 'Gold I';
            if(cs >= 100) csRank = 'Gold II';
            if(cs >= 120) csRank = 'Gold III';
            if(cs >= 140) csRank = 'Elite';
            
            // Credit score status
            let creditStatus = 'Poor';
            let creditClass = 'badge-danger';
            if(creditScore >= 90) { creditStatus = 'Excellent'; creditClass = 'badge-success'; }
            else if(creditScore >= 70) { creditStatus = 'Good'; creditClass = 'badge-success'; }
            else if(creditScore >= 50) { creditStatus = 'Fair'; creditClass = 'badge-info'; }
            
            // Format date
            let createdDate = 'N/A';
            if(created && created !== '0') {
                let d = new Date(parseInt(created) * 1000);
                createdDate = d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
            }
            
            const expProgress = (parseInt(exp) % 50000) / 50000 * 100;
            
            const html = `
                <div class="result-box">
                    <div class="result-header">
                        <h3><i class="fas fa-user"></i> ${escapeHtml(name)} <span class="badge badge-info">Level ${level}</span></h3>
                        <div style="font-size:12px; color:#aaa; margin-top:5px;">UID: ${uid} | Region: ${region.toUpperCase()}</div>
                    </div>
                    <div class="info-grid">
                        <div class="info-card">
                            <div class="info-label">🏆 BR RANK</div>
                            <div class="info-value">${brRank}</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(100, br/7000*100)}%"></div></div>
                            <div style="font-size:11px;">${br.toLocaleString()} points</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">🎮 CS RANK</div>
                            <div class="info-value">${csRank}</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(100, cs/150*100)}%"></div></div>
                            <div style="font-size:11px;">${cs.toLocaleString()} points</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">❤️ LIKES</div>
                            <div class="info-value">${parseInt(likes).toLocaleString()}</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">💳 CREDIT SCORE</div>
                            <div class="info-value"><span class="badge ${creditClass}">${creditScore} (${creditStatus})</span></div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">📈 EXPERIENCE</div>
                            <div class="info-value">${parseInt(exp).toLocaleString()} XP</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${expProgress}%"></div></div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">📅 CREATED</div>
                            <div class="info-value">${createdDate}</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">✍️ SIGNATURE</div>
                            <div class="info-value" style="font-size:13px;">${escapeHtml(signature)}</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">🏛️ GUILD</div>
                            <div class="info-value">${escapeHtml(guild)}</div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('infoResult').innerHTML = html;
        }

        // ========== BAN CHECK ==========
        async function fetchBanCheck(uid) {
            const container = document.getElementById('banResult');
            container.innerHTML = '<div class="loader active" style="padding:20px;"><div class="spinner"></div><p>Checking ban status...</p></div>';
            
            try {
                const res = await fetch(`${CORS_PROXY}https://silent-bancheck-api.vercel.app/bancheck?uid=${uid}`);
                const data = await res.json();
                
                const nickname = data.nickname || 'Unknown';
                const region = data.region || 'N/A';
                const banStatus = data.ban_status || 'Unknown';
                const isBanned = banStatus.toLowerCase() !== 'not banned';
                const statusIcon = isBanned ? '❌ BANNED' : '✅ NOT BANNED';
                const statusColor = isBanned ? '#ff4757' : '#00ff88';
                
                container.innerHTML = `
                    <div class="result-box">
                        <div class="result-header"><h3><i class="fas fa-shield-alt"></i> SILENT BAN CHECK</h3></div>
                        <div class="result-content"><pre>
┌─────────────────────────────────────────────────────────────────┐
│ 🔍 SILENT BAN CHECK                                                   
├─────────────────────────────────────────────────────────────────────────┤
│ PLAYER NAME: ${escapeHtml(nickname)}                                         
│ UID: ${uid}                                                       
│ REGION: ${region.toUpperCase()}                                                 
├─────────────────────────────────────────────────────────────────────────┤
│ BAN STATUS: <span style="color:${statusColor};">${statusIcon}</span>                                               
│ BAN PERIOD: ${data.ban_period || 'N/A'}                                        
└─────────────────────────────────────────────────────────────────────────┘

🔥 @SILENT_METHODE</pre></div>
                    </div>
                `;
            } catch(e) {
                container.innerHTML = `<div class="error-msg">❌ Ban Check Failed: ${e.message}</div>`;
            }
        }

        // ========== TOKEN GENERATOR ==========
        function showTokenForm() {
            const container = document.getElementById('tokenResult');
            container.innerHTML = `
                <div class="result-box">
                    <div class="result-header"><h3><i class="fas fa-key"></i> JWT Token Generator</h3></div>
                    <div class="token-form">
                        <div class="input-group"><label>📱 UID</label><input type="text" id="tokenUid" placeholder="Enter UID"></div>
                        <div class="input-group"><label>🔐 Password</label><input type="password" id="tokenPass" placeholder="Enter Password"></div>
                        <button class="gen-btn" onclick="generateToken()"><i class="fas fa-key"></i> Generate Token</button>
                    </div>
                    <div id="tokenOutput"></div>
                </div>
            `;
        }

        async function generateToken() {
            const uid = document.getElementById('tokenUid')?.value.trim();
            const password = document.getElementById('tokenPass')?.value.trim();
            const output = document.getElementById('tokenOutput');
            
            if(!uid || !password) {
                output.innerHTML = `<div class="error-msg">⚠️ Please enter both UID and Password</div>`;
                return;
            }
            
            output.innerHTML = '<div class="loader active" style="padding:20px;"><div class="spinner"></div><p>Generating token...</p></div>';
            
            try {
                const res = await fetch(`${CORS_PROXY}https://uid-password-to-jwt-f1uw.vercel.app/token?uid=${uid}&password=${encodeURIComponent(password)}`);
                const data = await res.json();
                
                const accountName = data.account_name || 'N/A';
                const accountId = data.account_id || 'N/A';
                const region = data.region || 'N/A';
                const accessToken = data.access_token || 'N/A';
                const jwtToken = data.token || 'N/A';
                
                output.innerHTML = `
                    <div class="result-content"><pre>
┌──────────────────────────────────
├ 🔑 SILENT TOKEN INFORMATION
├──────────────────────────────────
├ ACCOUNT NAME: ${escapeHtml(accountName)}
├ UID: ${uid}
├ ACCOUNT ID: ${accountId}
├ REGION: ${region}
├──────────────────────────────────
├ ACCESS TOKEN:
├ ${accessToken}
├──────────────────────────────────
├ JWT TOKEN:
├ ${jwtToken}
└──────────────────────────────────

🔥 @SILENT_METHODE</pre></div>
                `;
            } catch(e) {
                output.innerHTML = `<div class="error-msg">❌ Token Generation Failed: ${e.message}</div>`;
            }
        }

        function showError(msg, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="error-msg">⚠️ ${escapeHtml(msg)}</div>`;
            setTimeout(() => {
                if(container.innerHTML.includes(msg)) container.innerHTML = '';
            }, 4000);
        }

        function escapeHtml(str) {
            if(!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
