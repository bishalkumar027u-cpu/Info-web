<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SILENT FF | Player Stats Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #0a0a0a 0%, #1a1a2e 40%, #16213e 70%, #0f0f1a 100%);
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 40%, rgba(255,71,87,0.12) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0,255,255,0.08) 0%, transparent 45%);
            animation: slowDrift 24s ease infinite;
        }

        @keyframes slowDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-3%, -2%) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255,71,87,0.3);
            border-radius: 50%;
            animation: floatUp 10s infinite ease-in-out;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-20vh) scale(1); opacity: 0; }
        }

        /* Navbar */
        .navbar {
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            background: rgba(10, 10, 20, 0.5);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 32px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px #ff4757; }
            50% { transform: scale(1.05); text-shadow: 0 0 20px #ff4757; }
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text span {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            opacity: 0.7;
        }

        .nav-links a:hover {
            opacity: 1;
            color: #ff4757;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 50px 20px 35px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: rgba(255,255,255,0.6);
            font-size: 18px;
        }

        /* Search Box */
        .search-container {
            max-width: 550px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            padding: 5px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }

        .search-box:focus-within {
            border-color: #ff4757;
            box-shadow: 0 0 20px rgba(255,71,87,0.3);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 24px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .search-box button {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-box button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255,71,87,0.4);
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 24px;
            border-radius: 40px;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn:hover, .tab-btn.active {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border-color: transparent;
        }

        /* Loading */
        .loader {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,71,87,0.3);
            border-top-color: #ff4757;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result Cards */
        .result-card {
            max-width: 650px;
            margin: 0 auto 30px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            background: linear-gradient(135deg, rgba(255,71,87,0.15), rgba(255,107,129,0.05));
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .player-name {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .player-name i {
            color: #ff4757;
        }

        .rank-badge {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .uid-text {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-top: 8px;
            font-family: monospace;
        }

        /* Stats Grid */
        .stats-grid {
            padding: 20px 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px 16px;
            transition: all 0.3s;
        }

        .stat-item:hover {
            background: rgba(255,255,255,0.06);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .full-width {
            grid-column: span 2;
        }

        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 6px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            height: 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s;
        }

        /* Ban Status */
        .ban-status {
            margin: 0 25px 20px;
            padding: 12px 16px;
            border-radius: 16px;
            background: rgba(0,0,0,0.3);
        }

        .not-banned { color: #00ff88; }
        .banned { color: #ff4757; }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            padding: 0 25px 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }

        .btn-outline:hover {
            border-color: #ff4757;
            background: rgba(255,71,87,0.1);
        }

        /* Events List */
        .events-list {
            padding: 0 25px 20px;
        }

        .event-item {
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .event-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .event-date {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        /* Error */
        .error-message {
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(255,71,87,0.15);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 20px;
            text-align: center;
            color: #ff6b81;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 40px;
        }

        .footer a {
            color: #ff4757;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .navbar { padding: 15px 20px; }
            .logo-text { font-size: 18px; }
            .hero h1 { font-size: 32px; }
            .stats-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .action-buttons { flex-direction: column; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="particles" id="particles"></div>

    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">🔥</div>
            <div class="logo-text">SILENT <span>FF</span></div>
        </div>
        <div class="nav-links">
            <a href="#" onclick="showTab('info')">Info</a>
            <a href="#" onclick="showTab('events')">Events</a>
            <a href="https://t.me/SILENT_METHODE" target="_blank">Channel</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Free Fire Player Stats</h1>
        <p>Enter any UID to get instant player information</p>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="uidInput" placeholder="Enter UID (e.g., 13599330571)" onkeypress="if(event.key==='Enter') searchPlayer()">
            <button onclick="searchPlayer()"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('info')"><i class="fas fa-user"></i> Player Info</button>
        <button class="tab-btn" onclick="showTab('events')"><i class="fas fa-calendar"></i> Events</button>
        <button class="tab-btn" onclick="showTab('token')"><i class="fas fa-key"></i> Token Gen</button>
        <button class="tab-btn" onclick="showTab('wishlist')"><i class="fas fa-gift"></i> Wishlist</button>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Fetching data from SILENT API...</p>
    </div>

    <div id="infoResult"></div>
    <div id="eventsResult" class="hidden"></div>
    <div id="tokenResult" class="hidden"></div>
    <div id="wishlistResult" class="hidden"></div>

    <div class="footer">
        <p>🔥 Powered by SILENT API | 📢 <a href="https://t.me/SILENT_METHODE" target="_blank">@SILENT_METHODE</a></p>
        <p>👨‍💻 Developer: <a href="https://t.me/SIL3NT_KILLER" target="_blank">@SILENT_RDP</a></p>
    </div>

    <script>
        // ======================== PARTICLE EFFECT ========================
        function createParticles() {
            const container = document.getElementById('particles');
            for(let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.width = Math.random() * 5 + 2 + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 12 + 's';
                p.style.animationDuration = 8 + Math.random() * 10 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // ======================== UTILITY FUNCTIONS ========================
        function formatNumber(num) {
            if(!num) return 'N/A';
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function getCreditInfo(score) {
            let s = parseInt(score) || 0;
            if(s >= 90) return { emoji: '🟢', class: 'not-banned', text: 'Excellent' };
            if(s >= 70) return { emoji: '🟡', class: 'not-banned', text: 'Good' };
            if(s >= 50) return { emoji: '🟠', class: '', text: 'Fair' };
            return { emoji: '🔴', class: 'banned', text: 'Poor' };
        }

        function getRankName(points, type) {
            let p = parseInt(points) || 0;
            if(type === 'br') {
                if(p < 1000) return 'Bronze';
                if(p < 2000) return 'Silver';
                if(p < 3000) return 'Gold';
                if(p < 4000) return 'Platinum';
                if(p < 5000) return 'Diamond';
                if(p < 6000) return 'Heroic';
                if(p < 7000) return 'Mythic';
                return 'Grandmaster';
            } else {
                if(p < 20) return 'Bronze I';
                if(p < 40) return 'Bronze II';
                if(p < 60) return 'Silver I';
                if(p < 80) return 'Silver II';
                if(p < 100) return 'Gold I';
                if(p < 120) return 'Gold II';
                if(p < 140) return 'Gold III';
                return 'Elite';
            }
        }

        function formatDate(ts) {
            if(!ts || ts === '0') return 'N/A';
            let date = new Date(parseInt(ts) * 1000);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function formatDateTime(ts) {
            if(!ts || ts === '0') return 'N/A';
            let date = new Date(parseInt(ts) * 1000);
            return date.toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(tab === 'info') document.querySelector('.tabs button:first-child').classList.add('active');
            if(tab === 'events') document.querySelector('.tabs button:nth-child(2)').classList.add('active');
            if(tab === 'token') document.querySelector('.tabs button:nth-child(3)').classList.add('active');
            if(tab === 'wishlist') document.querySelector('.tabs button:nth-child(4)').classList.add('active');
            
            document.getElementById('infoResult').classList.add('hidden');
            document.getElementById('eventsResult').classList.add('hidden');
            document.getElementById('tokenResult').classList.add('hidden');
            document.getElementById('wishlistResult').classList.add('hidden');
            
            document.getElementById(tab + 'Result').classList.remove('hidden');
            
            if(tab === 'events') fetchEvents();
        }

        // ======================== SEARCH PLAYER (INFO TAB) ========================
        async function searchPlayer() {
            const uid = document.getElementById('uidInput').value.trim();
            if(!uid) { showError('Please enter a UID', 'infoResult'); return; }
            if(!/^\d{8,11}$/.test(uid)) { showError('Invalid UID! Must be 8-11 digits', 'infoResult'); return; }

            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('infoResult');
            
            loader.classList.add('active');
            resultDiv.innerHTML = '';

            try {
                // API 1: Player Info
                const infoRes = await fetch(`https://mafuuuu-info-api.vercel.app/mafu-info?uid=${uid}`);
                if(!infoRes.ok) throw new Error('API request failed');
                const data = await infoRes.json();
                
                if(!data || !data.basicInfo) throw new Error('Player not found');

                displayPlayerInfo(data, uid);
                
                // API 2: Ban Status
                fetchBanStatus(uid);
                
            } catch(err) {
                showError(err.message || 'Failed to fetch player data', 'infoResult');
            } finally {
                loader.classList.remove('active');
            }
        }

        async function fetchBanStatus(uid) {
            try {
                const res = await fetch(`https://silent-bancheck-api.vercel.app/bancheck?uid=${uid}`);
                if(res.ok) {
                    const data = await res.json();
                    updateBanStatus(data);
                }
            } catch(e) { console.log('Ban check failed:', e); }
        }

        function updateBanStatus(data) {
            const banDiv = document.getElementById('banStatus');
            if(!banDiv) return;
            
            const isBanned = data.ban_status?.toLowerCase() !== 'not banned';
            banDiv.innerHTML = isBanned ? 
                `<span class="banned"><i class="fas fa-skull"></i> BANNED</span> - ${data.ban_period || 'Permanent Ban'}` :
                `<span class="not-banned"><i class="fas fa-check-circle"></i> NOT BANNED</span> - Clean Account`;
        }

        function displayPlayerInfo(data, uid) {
            const basic = data.basicInfo || {};
            const clan = data.clanBasicInfo || {};
            const credit = data.creditScoreInfo || {};
            const social = data.socialInfo || {};
            
            const name = basic.nickname || 'Unknown';
            const region = basic.region || 'N/A';
            const level = basic.level || 'N/A';
            const exp = basic.exp || '0';
            const likes = basic.liked || '0';
            const brPoints = basic.rankingPoints || '0';
            const csPoints = basic.csRankingPoints || '0';
            const creditScore = credit.creditScore || '0';
            const created = basic.createAt || '0';
            const lastLogin = basic.lastLoginAt || '0';
            const title = basic.title || 'No Title';
            const signature = social.signature || 'No bio';
            const guildName = clan.clanName || 'No Guild';
            
            const brRank = getRankName(brPoints, 'br');
            const csRank = getRankName(csPoints, 'cs');
            const creditInfo = getCreditInfo(creditScore);
            const expProgress = (parseInt(exp) % 50000) / 50000 * 100;
            
            const html = `
                <div class="result-card" id="resultCard">
                    <div class="card-header">
                        <div class="player-name">
                            <i class="fas fa-user"></i> ${escapeHtml(name)}
                            <span class="rank-badge">Level ${level}</span>
                        </div>
                        <div class="uid-text">📱 UID: ${uid} | 🌍 Region: ${region.toUpperCase()}</div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label"><i class="fas fa-trophy"></i> BR RANK</div>
                            <div class="stat-value">${brRank}</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(100, (brPoints/7000)*100)}%"></div></div>
                            <div style="font-size:12px;color:#aaa;">${formatNumber(brPoints)} points</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label"><i class="fas fa-gamepad"></i> CS RANK</div>
                            <div class="stat-value">${csRank}</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(100, (csPoints/150)*100)}%"></div></div>
                            <div style="font-size:12px;color:#aaa;">${formatNumber(csPoints)} points</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label"><i class="fas fa-heart"></i> LIKES</div>
                            <div class="stat-value">${formatNumber(likes)}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label"><i class="fas fa-credit-card"></i> CREDIT SCORE</div>
                            <div class="stat-value ${creditInfo.class}">${creditInfo.emoji} ${creditScore} (${creditInfo.text})</div>
                        </div>
                        <div class="stat-item full-width">
                            <div class="stat-label"><i class="fas fa-chart-line"></i> EXPERIENCE</div>
                            <div class="stat-value">${formatNumber(exp)} XP</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${expProgress}%"></div></div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label"><i class="fas fa-calendar"></i> CREATED</div>
                            <div class="stat-value" style="font-size:14px;">${formatDate(created)}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label"><i class="fas fa-clock"></i> LAST LOGIN</div>
                            <div class="stat-value" style="font-size:14px;">${formatDateTime(lastLogin)}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label"><i class="fas fa-flag"></i> TITLE</div>
                            <div class="stat-value" style="font-size:13px;">${escapeHtml(title)}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label"><i class="fas fa-building"></i> GUILD</div>
                            <div class="stat-value" style="font-size:13px;">${escapeHtml(guildName)}</div>
                        </div>
                    </div>
                    
                    <div class="ban-status" id="banStatus">
                        <i class="fas fa-shield-alt"></i> Checking ban status...
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="fetchOutfit('${uid}', '${region}')">
                            <i class="fas fa-tshirt"></i> Show Outfit
                        </button>
                        <button class="btn btn-outline" onclick="fetchBanner('${uid}')">
                            <i class="fas fa-image"></i> Show Banner
                        </button>
                    </div>
                </div>
            `;
            
            document.getElementById('infoResult').innerHTML = html;
        }

        async function fetchOutfit(uid, region) {
            const regionLower = (region || 'ind').toLowerCase();
            const url = `https://silent-outfit-api.vercel.app/outfit-image?uid=${uid}&region=${regionLower}&key=SILENT`;
            const card = document.getElementById('resultCard');
            if(card) {
                const existing = document.getElementById('outfitImg');
                if(existing) existing.remove();
                const div = document.createElement('div');
                div.id = 'outfitImg';
                div.style.cssText = 'padding:0 25px 20px;';
                div.innerHTML = `<div style="border-radius:20px; overflow:hidden;"><img src="${url}" style="width:100%; border-radius:20px;" onerror="this.src='https://placehold.co/400x200?text=Outfit+Not+Found'"></div>`;
                card.insertBefore(div, card.lastElementChild);
            }
        }

        async function fetchBanner(uid) {
            const url = `https://banner-views-pink.vercel.app/profile?uid=${uid}`;
            const card = document.getElementById('resultCard');
            if(card) {
                const existing = document.getElementById('bannerImg');
                if(existing) existing.remove();
                const div = document.createElement('div');
                div.id = 'bannerImg';
                div.style.cssText = 'padding:0 25px 20px;';
                div.innerHTML = `<div style="border-radius:20px; overflow:hidden;"><img src="${url}" style="width:100%; border-radius:20px;" onerror="this.src='https://placehold.co/400x200?text=Banner+Not+Found'"></div>`;
                card.insertBefore(div, card.lastElementChild);
            }
        }

        // ======================== EVENTS TAB ========================
        async function fetchEvents() {
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('eventsResult');
            
            loader.classList.add('active');
            resultDiv.innerHTML = '';
            resultDiv.classList.remove('hidden');

            try {
                const regions = ['ind', 'sg', 'id', 'bd', 'th', 'vn'];
                let allEvents = [];
                
                for(const region of regions) {
                    try {
                        const res = await fetch(`https://narayan-event.vercel.app/event?region=${region}`);
                        if(res.ok) {
                            const data = await res.json();
                            if(data.events && data.events.length) {
                                allEvents.push(...data.events.map(e => ({ ...e, region: region.toUpperCase() })));
                            }
                        }
                    } catch(e) {}
                }
                
                if(allEvents.length === 0) {
                    resultDiv.innerHTML = `<div class="error-message"><i class="fas fa-calendar-times"></i> No active events found</div>`;
                } else {
                    let html = `<div class="result-card"><div class="card-header"><div class="player-name"><i class="fas fa-calendar-alt"></i> Active Events</div><div class="uid-text">Showing latest events from all regions</div></div><div class="events-list">`;
                    for(const event of allEvents.slice(0,8)) {
                        html += `
                            <div class="event-item">
                                <div class="event-title">🎉 ${escapeHtml(event.Title || 'Event')}</div>
                                <div class="event-date">📅 ${event.Start ? formatDate(event.Start) : 'TBD'} → ${event.End ? formatDate(event.End) : 'TBD'} | 🌍 ${event.region}</div>
                            </div>
                        `;
                    }
                    html += `</div></div>`;
                    resultDiv.innerHTML = html;
                }
            } catch(err) {
                resultDiv.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Failed to load events: ${err.message}</div>`;
            } finally {
                loader.classList.remove('active');
            }
        }

        // ======================== TOKEN TAB ========================
        function showTokenGen() {
            const resultDiv = document.getElementById('tokenResult');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `
                <div class="result-card">
                    <div class="card-header">
                        <div class="player-name"><i class="fas fa-key"></i> JWT Token Generator</div>
                        <div class="uid-text">Generate access token using UID and password</div>
                    </div>
                    <div style="padding:20px 25px;">
                        <div class="search-box" style="margin-bottom:15px;">
                            <input type="text" id="tokenUid" placeholder="Enter UID" style="flex:1;">
                        </div>
                        <div class="search-box" style="margin-bottom:20px;">
                            <input type="password" id="tokenPass" placeholder="Enter Password" style="flex:1;">
                        </div>
                        <button class="btn btn-primary" onclick="generateToken()" style="width:100%;">
                            <i class="fas fa-key"></i> Generate Token
                        </button>
                    </div>
                    <div id="tokenOutput" style="padding:0 25px 20px;"></div>
                </div>
            `;
        }

        async function generateToken() {
            const uid = document.getElementById('tokenUid')?.value.trim();
            const password = document.getElementById('tokenPass')?.value.trim();
            const output = document.getElementById('tokenOutput');
            
            if(!uid || !password) {
                output.innerHTML = `<div class="error-message">Please enter both UID and Password</div>`;
                return;
            }
            
            output.innerHTML = `<div class="loader active" style="padding:20px;"><div class="spinner"></div><p>Generating token...</p></div>`;
            
            try {
                const res = await fetch(`https://uid-password-to-jwt-f1uw.vercel.app/token?uid=${uid}&password=${password}`);
                const data = await res.json();
                
                if(data.status === 'success' && data.access_token) {
                    output.innerHTML = `
                        <div class="stat-item full-width" style="margin-bottom:10px;">
                            <div class="stat-label">ACCESS TOKEN</div>
                            <div class="stat-value" style="font-size:12px; word-break:break-all; font-family:monospace;">${escapeHtml(data.access_token)}</div>
                        </div>
                        <div class="stat-item full-width">
                            <div class="stat-label">JWT TOKEN</div>
                            <div class="stat-value" style="font-size:12px; word-break:break-all; font-family:monospace;">${escapeHtml(data.token || 'N/A')}</div>
                        </div>
                        <div class="stat-item full-width" style="margin-top:10px;">
                            <div class="stat-label">ACCOUNT</div>
                            <div class="stat-value">${escapeHtml(data.account_name || 'N/A')} (${data.account_id || uid})</div>
                        </div>
                    `;
                } else {
                    output.innerHTML = `<div class="error-message">Invalid UID or Password</div>`;
                }
            } catch(err) {
                output.innerHTML = `<div class="error-message">Failed to generate token: ${err.message}</div>`;
            }
        }

        // ======================== WISHLIST TAB ========================
        function showWishlist() {
            const resultDiv = document.getElementById('wishlistResult');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `
                <div class="result-card">
                    <div class="card-header">
                        <div class="player-name"><i class="fas fa-gift"></i> Wishlist Viewer</div>
                        <div class="uid-text">View player's wishlist items</div>
                    </div>
                    <div style="padding:20px 25px;">
                        <div class="search-box" style="margin-bottom:15px;">
                            <input type="text" id="wishlistUid" placeholder="Enter UID" style="flex:1;">
                        </div>
                        <div class="search-box" style="margin-bottom:20px;">
                            <input type="text" id="wishlistRegion" placeholder="Region (ind, sg, id, bd)" style="flex:1;" value="ind">
                        </div>
                        <button class="btn btn-primary" onclick="fetchWishlist()" style="width:100%;">
                            <i class="fas fa-search"></i> Get Wishlist
                        </button>
                    </div>
                    <div id="wishlistOutput" style="padding:0 25px 20px;"></div>
                </div>
            `;
        }

        async function fetchWishlist() {
            const uid = document.getElementById('wishlistUid')?.value.trim();
            const region = document.getElementById('wishlistRegion')?.value.trim().toLowerCase() || 'ind';
            const output = document.getElementById('wishlistOutput');
            
            if(!uid) {
                output.innerHTML = `<div class="error-message">Please enter UID</div>`;
                return;
            }
            
            output.innerHTML = `<div class="loader active" style="padding:20px;"><div class="spinner"></div><p>Fetching wishlist...</p></div>`;
            
            try {
                const res = await fetch(`https://ffwishlistapis.vercel.app/wish?uid=${uid}&region=${region}`);
                const data = await res.json();
                
                if(data.wishlist && data.wishlist.length > 0) {
                    let html = `<div class="stat-item full-width"><div class="stat-label">WISHLIST ITEMS (${data.wishlist.length})</div></div>`;
                    for(const item of data.wishlist.slice(0,15)) {
                        html += `<div class="stat-item full-width" style="margin-bottom:8px;"><div class="stat-value" style="font-size:14px;">🎁 ${escapeHtml(item.name || item.item_name || 'Item')}</div></div>`;
                    }
                    output.innerHTML = html;
                } else {
                    output.innerHTML = `<div class="error-message">No wishlist items found for this player</div>`;
                }
            } catch(err) {
                output.innerHTML = `<div class="error-message">Failed to fetch wishlist: ${err.message}</div>`;
            }
        }

        function showError(msg, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${escapeHtml(msg)}</div>`;
            setTimeout(() => {
                if(container.innerHTML.includes(msg)) container.innerHTML = '';
            }, 4000);
        }

        // Initialize token and wishlist tabs on click
        document.querySelector('.tabs button:nth-child(3)').onclick = () => { showTab('token'); showTokenGen(); };
        document.querySelector('.tabs button:nth-child(4)').onclick = () => { showTab('wishlist'); showWishlist(); };
    </script>
</body>
</html>
