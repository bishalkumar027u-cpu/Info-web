<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SILENT FF | Outfit & Banner Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 30%, #16213e 60%, #0f0f1a 100%);
            background-size: 400% 400%;
            animation: gradientFlow 12s ease infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glow Orbs */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(255,71,87,0.2);
            top: -100px;
            left: -100px;
            animation: floatOrb 20s ease infinite;
        }
        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(0,210,255,0.15);
            bottom: -150px;
            right: -150px;
            animation: floatOrb 25s ease infinite reverse;
        }
        .orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(255,165,0,0.1);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulseOrb 8s ease infinite;
        }
        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }
        @keyframes pulseOrb {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.2); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border-radius: 50%;
            opacity: 0.3;
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-20vh) scale(1); opacity: 0; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #ff4757, #ff6b81); border-radius: 10px; }

        /* Navbar */
        .navbar {
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            background: rgba(10, 10, 20, 0.3);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 34px;
            animation: logoGlow 2s ease infinite;
        }
        @keyframes logoGlow {
            0%, 100% { text-shadow: 0 0 5px #ff4757; transform: scale(1); }
            50% { text-shadow: 0 0 20px #ff4757; transform: scale(1.05); }
        }
        .logo-text {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff4757, #ff6b81, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 30px;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            opacity: 0.7;
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            transition: width 0.3s;
        }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a:hover { opacity: 1; }

        /* Hero */
        .hero {
            text-align: center;
            padding: 50px 20px 35px;
        }
        .hero h1 {
            font-size: 52px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .hero p {
            color: rgba(255,255,255,0.5);
            font-size: 18px;
        }

        /* Search Box */
        .search-container {
            max-width: 550px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }
        .search-box {
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 70px;
            padding: 6px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }
        .search-box:focus-within {
            border-color: #ff4757;
            box-shadow: 0 0 25px rgba(255,71,87,0.3);
            background: rgba(255,255,255,0.06);
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 25px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .search-box input::placeholder {
            color: rgba(255,255,255,0.35);
        }
        .search-box button {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            padding: 12px 35px;
            border-radius: 60px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-box button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(255,71,87,0.4);
        }

        /* Tabs - Sirf Outfit aur Banner */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 35px;
            border-radius: 50px;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tab-btn:hover {
            background: rgba(255,71,87,0.15);
            border-color: rgba(255,71,87,0.4);
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border-color: transparent;
            box-shadow: 0 5px 15px rgba(255,71,87,0.3);
        }

        /* Cards Container */
        .cards-container {
            max-width: 750px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            margin-bottom: 25px;
            animation: slideUp 0.5s ease;
            transition: all 0.3s;
        }
        .glass-card:hover {
            border-color: rgba(255,71,87,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Card Header */
        .card-header {
            background: linear-gradient(135deg, rgba(255,71,87,0.1), rgba(255,107,129,0.03));
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .card-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-title i {
            color: #ff4757;
            font-size: 24px;
        }
        .card-subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            margin-top: 8px;
            font-family: monospace;
        }

        /* Image Container */
        .image-container {
            padding: 25px;
            text-align: center;
        }
        .image-container img {
            max-width: 100%;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .image-container img:hover {
            transform: scale(1.02);
            border-color: rgba(255,71,87,0.3);
            box-shadow: 0 10px 30px rgba(255,71,87,0.2);
        }

        /* Download Button */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 40px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            margin-top: 10px;
        }
        .download-btn:hover {
            background: rgba(255,71,87,0.15);
            border-color: rgba(255,71,87,0.4);
        }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 50px;
        }
        .loader.active {
            display: block;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,71,87,0.15);
            border-top: 3px solid #ff4757;
            border-right: 3px solid #ff6b81;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }

        /* Error */
        .error-message {
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(255,71,87,0.1);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 24px;
            text-align: center;
            color: #ff6b81;
        }

        /* Modal */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .image-modal.active {
            display: flex;
            animation: fadeIn 0.3s;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255,71,87,0.3);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.03);
            margin-top: 30px;
        }
        .footer a {
            color: #ff4757;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .navbar { padding: 15px 25px; }
            .logo-text { font-size: 20px; }
            .logo-icon { font-size: 28px; }
            .hero h1 { font-size: 32px; }
            .search-box { flex-direction: column; border-radius: 30px; padding: 15px; }
            .search-box button { padding: 12px; }
            .tab-btn { padding: 8px 22px; font-size: 13px; }
            .card-title { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
    <div class="particles" id="particles"></div>

    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">🔥</span>
            <span class="logo-text">SILENT <span>FF</span></span>
        </div>
        <div class="nav-links">
            <a href="https://t.me/SILENT_GAM3R" target="_blank"><i class="fab fa-telegram"></i> Channel</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Outfit & Banner Viewer</h1>
        <p>Enter any UID to view player's outfit and banner</p>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="uidInput" placeholder="Enter UID (e.g., 1576195175, 3560222916)" onkeypress="if(event.key==='Enter') searchPlayer()">
            <button onclick="searchPlayer()"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('outfit')"><i class="fas fa-tshirt"></i> Outfit</button>
        <button class="tab-btn" onclick="showTab('banner')"><i class="fas fa-image"></i> Banner</button>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Fetching from SILENT API...</p>
    </div>

    <div class="cards-container" id="resultContainer"></div>

    <div id="imageModal" class="image-modal" onclick="closeModal()">
        <img id="modalImage" src="">
    </div>

    <div class="footer">
        <p>🔥 Powered by <strong>SILENT API</strong> | 📢 <a href="https://t.me/SILENT_GAM3R" target="_blank">@SILENT_GAM3R</a></p>
        <p>👨‍💻 Developer: <a href="https://t.me/SIL3NT_KILLER" target="_blank">@SIL3NT_KILLER</a></p>
    </div>

    <script>
        // Particles
        function createParticles() {
            const container = document.getElementById('particles');
            for(let i = 0; i < 100; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.width = Math.random() * 5 + 2 + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = 5 + Math.random() * 15 + 's';
                p.style.animationDelay = Math.random() * 15 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        let currentUid = '';
        let currentRegion = 'ind';

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(tab === 'outfit') document.querySelector('.tabs button:nth-child(1)').classList.add('active');
            if(tab === 'banner') document.querySelector('.tabs button:nth-child(2)').classList.add('active');
            
            if(currentUid) {
                if(tab === 'outfit') fetchOutfit(currentUid, currentRegion);
                if(tab === 'banner') fetchBanner(currentUid);
            }
        }

        async function searchPlayer() {
            const uid = document.getElementById('uidInput').value.trim();
            if(!uid) {
                showError('Please enter a UID');
                return;
            }
            if(!/^\d{8,11}$/.test(uid)) {
                showError('Invalid UID! Must be 8-11 digits');
                return;
            }
            
            currentUid = uid;
            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('resultContainer');
            
            loader.classList.add('active');
            resultContainer.innerHTML = '';
            
            try {
                // Get region first
                const regionRes = await fetch(`https://region-check-six.vercel.app/?uid=${uid}`);
                const regionData = await regionRes.json();
                currentRegion = (regionData.region || 'ind').toLowerCase();
                
                // Show active tab content
                const activeTab = document.querySelector('.tab-btn.active').innerText.toLowerCase();
                if(activeTab.includes('outfit')) {
                    fetchOutfit(uid, currentRegion);
                } else {
                    fetchBanner(uid);
                }
            } catch(err) {
                // Fallback region
                currentRegion = 'ind';
                fetchOutfit(uid, 'ind');
            } finally {
                loader.classList.remove('active');
            }
        }

        async function fetchOutfit(uid, region) {
            const resultContainer = document.getElementById('resultContainer');
            const regionLower = region.toLowerCase();
            const imageUrl = `https://silent-outfit-api.vercel.app/outfit-image?uid=${uid}&region=${regionLower}&key=SILENT`;
            
            resultContainer.innerHTML = `
                <div class="glass-card">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-tshirt"></i> Player Outfit
                        </div>
                        <div class="card-subtitle">
                            <i class="fas fa-id-card"></i> UID: ${uid} | 
                            <i class="fas fa-globe"></i> Region: ${regionLower.toUpperCase()}
                        </div>
                    </div>
                    <div class="image-container">
                        <img src="${imageUrl}" alt="Player Outfit" onclick="openModal('${imageUrl}')" onerror="this.src='https://placehold.co/600x400/1a1a2e/ff4757?text=Outfit+Not+Found'">
                        <div>
                            <a href="${imageUrl}" download="outfit_${uid}.jpg" class="download-btn">
                                <i class="fas fa-download"></i> Download Outfit
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        async function fetchBanner(uid) {
            const resultContainer = document.getElementById('resultContainer');
            const imageUrl = `https://banner-views-pink.vercel.app/profile?uid=${uid}`;
            
            resultContainer.innerHTML = `
                <div class="glass-card">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-image"></i> Player Banner
                        </div>
                        <div class="card-subtitle">
                            <i class="fas fa-id-card"></i> UID: ${uid}
                        </div>
                    </div>
                    <div class="image-container">
                        <img src="${imageUrl}" alt="Player Banner" onclick="openModal('${imageUrl}')" onerror="this.src='https://placehold.co/800x300/1a1a2e/ff4757?text=Banner+Not+Found'">
                        <div>
                            <a href="${imageUrl}" download="banner_${uid}.jpg" class="download-btn">
                                <i class="fas fa-download"></i> Download Banner
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        function openModal(imgSrc) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modalImg.src = imgSrc;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        function showError(msg) {
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${msg}</div>`;
            setTimeout(() => {
                if(resultContainer.innerHTML.includes(msg)) resultContainer.innerHTML = '';
            }, 4000);
        }
    </script>
</body>
</html>
