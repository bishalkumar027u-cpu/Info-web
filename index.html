<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILENT FF | Ultimate Player Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff006e;
            --secondary: #00d4ff;
            --accent: #b537f2;
            --dark: #0a0e27;
            --darker: #050812;
            --card-bg: rgba(20, 30, 60, 0.4);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, #1a0f3f 50%, var(--dark) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            bottom: -50px;
            left: -50px;
            animation-delay: 2s;
        }

        .blob-3 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            top: 50%;
            left: 50%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -50px); }
            66% { transform: translate(-20px, 30px); }
        }

        /* Navbar */
        .navbar {
            backdrop-filter: blur(20px);
            background: rgba(10, 14, 39, 0.6);
            border-bottom: 1px solid rgba(255, 0, 110, 0.2);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Righteous', cursive;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 0, 110, 0.3); }
            50% { text-shadow: 0 0 20px rgba(255, 0, 110, 0.6); }
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 40px 40px;
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-family: 'Righteous', cursive;
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent), var(--primary));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        /* Search Box */
        .search-section {
            max-width: 600px;
            margin: 0 auto 50px;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .search-wrapper {
            display: flex;
            gap: 12px;
            background: rgba(20, 30, 60, 0.3);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 0, 110, 0.2);
            border-radius: 60px;
            padding: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(255, 0, 110, 0.1);
        }

        .search-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 8px 32px rgba(255, 0, 110, 0.3);
            transform: translateY(-2px);
        }

        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 24px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .search-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: white;
            padding: 12px 32px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.3);
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 110, 0.5);
        }

        .search-btn:active {
            transform: scale(0.95);
        }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 0.3s ease;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            border: 4px solid rgba(255, 0, 110, 0.2);
            border-top: 4px solid var(--primary);
            border-right: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px 60px;
        }

        /* Player Card */
        .player-card {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.1), rgba(181, 55, 242, 0.1));
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 0, 110, 0.2);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            animation: slideUp 0.6s ease;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .player-card:hover {
            border-color: var(--primary);
            box-shadow: 0 12px 48px rgba(255, 0, 110, 0.2);
            transform: translateY(-5px);
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 0, 110, 0.1);
        }

        .player-info h2 {
            font-size: 36px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .player-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-item i {
            color: var(--primary);
        }

        .level-badge {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.3);
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(20, 30, 60, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 110, 0.15);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            animation: slideUp 0.6s ease;
            animation-fill-mode: both;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }
        .stat-card:nth-child(5) { animation-delay: 0.5s; }
        .stat-card:nth-child(6) { animation-delay: 0.6s; }

        .stat-card:hover {
            background: rgba(20, 30, 60, 0.8);
            border-color: var(--primary);
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(255, 0, 110, 0.2);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.3);
        }

        .stat-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .stat-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Progress Bar */
        .progress-container {
            margin-top: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            animation: fillProgress 1s ease;
        }

        @keyframes fillProgress {
            from { width: 0; }
        }

        /* Rank Badges */
        .rank-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid rgba(255, 0, 110, 0.1);
        }

        .rank-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(181, 55, 242, 0.1));
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease;
        }

        .rank-card:hover {
            border-color: var(--secondary);
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.2);
        }

        .rank-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .rank-name {
            font-size: 24px;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 8px;
        }

        .rank-points {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Guild Section */
        .guild-section {
            background: linear-gradient(135deg, rgba(181, 55, 242, 0.1), rgba(255, 0, 110, 0.1));
            border: 2px solid rgba(181, 55, 242, 0.2);
            border-radius: 20px;
            padding: 24px;
            margin-top: 30px;
            animation: slideUp 0.6s ease 0.7s both;
        }

        .guild-section h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .guild-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .guild-item {
            background: rgba(20, 30, 60, 0.5);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }

        .guild-item-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .guild-item-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Bio Section */
        .bio-section {
            background: rgba(20, 30, 60, 0.5);
            border: 1px solid rgba(255, 0, 110, 0.15);
            border-radius: 20px;
            padding: 24px;
            margin-top: 30px;
            animation: slideUp 0.6s ease 0.8s both;
        }

        .bio-section h3 {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .bio-text {
            font-size: 16px;
            color: var(--text-primary);
            line-height: 1.6;
            word-break: break-word;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(20, 30, 60, 0.5);
            border: 2px solid rgba(255, 0, 110, 0.2);
            color: var(--text-primary);
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .tab-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.3);
        }

        /* Image Container */
        .image-section {
            margin-top: 30px;
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }

        .image-section img {
            max-width: 100%;
            border-radius: 20px;
            border: 2px solid rgba(255, 0, 110, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(255, 0, 110, 0.1);
        }

        .image-section img:hover {
            transform: scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 12px 48px rgba(255, 0, 110, 0.2);
        }

        /* Hidden */
        .hidden {
            display: none;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            border-top: 1px solid rgba(255, 0, 110, 0.1);
            margin-top: 60px;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .footer a:hover {
            color: var(--secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }

            .navbar-content {
                flex-direction: column;
                gap: 15px;
            }

            .hero {
                padding: 40px 20px 30px;
            }

            .hero h1 {
                font-size: 36px;
            }

            .container {
                padding: 0 20px 40px;
            }

            .player-card {
                padding: 24px;
            }

            .player-header {
                flex-direction: column;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .search-section {
                padding: 0 20px;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 28px;
            }

            .player-info h2 {
                font-size: 24px;
            }

            .stat-value {
                font-size: 22px;
            }

            .rank-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">
                <i class="fas fa-fire"></i> SILENT FF
            </div>
            <div class="nav-links">
                <a href="https://t.me/SILENT_GAM3R" target="_blank">
                    <i class="fab fa-telegram"></i> Join Channel
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero">
        <h1>⚡ Free Fire Player Stats</h1>
        <p>Get complete player information with stunning visuals</p>
    </div>

    <!-- Search Section -->
    <div class="search-section">
        <div class="search-wrapper">
            <input type="text" id="uidInput" placeholder="Enter Player UID (e.g., 13599330571)" onkeypress="if(event.key==='Enter') searchPlayer()">
            <button class="search-btn" onclick="searchPlayer()">
                <i class="fas fa-search"></i> Search
            </button>
        </div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Fetching player data...</p>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div id="resultContainer"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>🔥 Powered by <strong>SILENT API</strong> | 📢 <a href="https://t.me/SILENT_GAM3R" target="_blank">@SILENT_GAM3R</a></p>
        <p style="margin-top: 10px; font-size: 12px;">Made with ❤️ for Free Fire Community</p>
    </div>

    <script>
        async function searchPlayer() {
            const uid = document.getElementById('uidInput').value.trim();
            
            if (!uid) {
                alert('Please enter a UID');
                return;
            }

            if (!/^\d{8,11}$/.test(uid)) {
                alert('Invalid UID! Must be 8-11 digits');
                return;
            }

            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('resultContainer');
            
            loader.classList.add('active');
            resultContainer.innerHTML = '';

            try {
                const response = await fetch(`https://mafuuuu-info-api.vercel.app/mafu-info?uid=${uid}`);
                if (!response.ok) throw new Error('Failed to fetch');
                
                const data = await response.json();
                displayPlayer(data, uid);
            } catch (error) {
                resultContainer.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--primary);">
                        <i class="fas fa-exclamation-circle" style="font-size: 48px; margin-bottom: 15px;"></i>
                        <p>Failed to fetch player data. Please check the UID and try again.</p>
                    </div>
                `;
            } finally {
                loader.classList.remove('active');
            }
        }

        function displayPlayer(data, uid) {
            const basic = data.basicInfo || {};
            const clan = data.clanBasicInfo || {};
            const credit = data.creditScoreInfo || {};
            const social = data.socialInfo || {};
            const pet = data.petInfo || {};

            const name = basic.nickname || 'Unknown';
            const level = basic.level || 0;
            const region = basic.region || 'N/A';
            const likes = basic.liked || 0;
            const exp = basic.exp || 0;
            const brPoints = parseInt(basic.rankingPoints || 0);
            const csPoints = parseInt(basic.csRankingPoints || 0);
            const creditScore = credit.creditScore || 0;
            const signature = social.signature || 'No bio';
            const guildName = clan.clanName || 'No Guild';
            const guildLevel = clan.clanLevel || 0;
            const guildMembers = clan.memberNum || 0;
            const petLevel = pet.level || 0;

            // Calculate Ranks
            const brRank = calculateBRRank(brPoints);
            const csRank = calculateCSRank(csPoints);
            const createdDate = formatDate(basic.createAt);
            const lastLoginDate = formatDate(basic.lastLoginAt);

            const brProgress = Math.min(100, (brPoints / 7000) * 100);
            const csProgress = Math.min(100, (csPoints / 150) * 100);

            const html = `
                <div class="player-card">
                    <div class="player-header">
                        <div class="player-info">
                            <h2>${escapeHtml(name)}</h2>
                            <div class="player-meta">
                                <div class="meta-item"><i class="fas fa-id-card"></i> ${uid}</div>
                                <div class="meta-item"><i class="fas fa-globe"></i> ${region.toUpperCase()}</div>
                                <div class="meta-item"><i class="fas fa-calendar"></i> ${createdDate}</div>
                            </div>
                        </div>
                        <div class="level-badge">
                            <i class="fas fa-star"></i> Level ${level}
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-trophy"></i></div>
                            <div class="stat-label">BR Rank</div>
                            <div class="stat-value">${brRank}</div>
                            <div class="progress-container">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${brProgress}%"></div>
                                </div>
                                <div class="stat-subtitle">${brPoints.toLocaleString()} Points</div>
                            </div>
                        </div>

                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-gamepad"></i></div>
                            <div class="stat-label">CS Rank</div>
                            <div class="stat-value">${csRank}</div>
                            <div class="progress-container">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${csProgress}%"></div>
                                </div>
                                <div class="stat-subtitle">${csPoints.toLocaleString()} Points</div>
                            </div>
                        </div>

                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-heart"></i></div>
                            <div class="stat-label">Likes</div>
                            <div class="stat-value">${likes.toLocaleString()}</div>
                            <div class="stat-subtitle">Player Appreciation</div>
                        </div>

                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-bolt"></i></div>
                            <div class="stat-label">Experience</div>
                            <div class="stat-value">${(exp / 1000).toFixed(1)}K</div>
                            <div class="stat-subtitle">Total XP Earned</div>
                        </div>

                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-shield"></i></div>
                            <div class="stat-label">Credit Score</div>
                            <div class="stat-value">${creditScore}/100</div>
                            <div class="stat-subtitle">${getCreditStatus(creditScore)}</div>
                        </div>

                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-clock"></i></div>
                            <div class="stat-label">Last Login</div>
                            <div class="stat-value">${lastLoginDate}</div>
                            <div class="stat-subtitle">Last Activity</div>
                        </div>
                    </div>

                    <div class="rank-section">
                        <div class="rank-card">
                            <div class="rank-title">🏆 BR Rank</div>
                            <div class="rank-name">${brRank}</div>
                            <div class="rank-points">${brPoints.toLocaleString()} Points</div>
                        </div>
                        <div class="rank-card">
                            <div class="rank-title">🎮 CS Rank</div>
                            <div class="rank-name">${csRank}</div>
                            <div class="rank-points">${csPoints.toLocaleString()} Points</div>
                        </div>
                        <div class="rank-card">
                            <div class="rank-title">⭐ Pet</div>
                            <div class="rank-name">Level ${petLevel}</div>
                            <div class="rank-points">Companion</div>
                        </div>
                    </div>

                    <div class="guild-section">
                        <h3><i class="fas fa-users"></i> Guild Information</h3>
                        <div class="guild-info">
                            <div class="guild-item">
                                <div class="guild-item-label">Guild Name</div>
                                <div class="guild-item-value">${escapeHtml(guildName)}</div>
                            </div>
                            <div class="guild-item">
                                <div class="guild-item-label">Guild Level</div>
                                <div class="guild-item-value">${guildLevel}</div>
                            </div>
                            <div class="guild-item">
                                <div class="guild-item-label">Members</div>
                                <div class="guild-item-value">${guildMembers}</div>
                            </div>
                        </div>
                    </div>

                    ${signature && signature !== 'No bio' ? `
                        <div class="bio-section">
                            <h3><i class="fas fa-quote-left"></i> Bio</h3>
                            <div class="bio-text">"${escapeHtml(signature)}"</div>
                        </div>
                    ` : ''}

                    <div class="tabs">
                        <button class="tab-btn active" onclick="viewOutfit('${uid}', '${region}')">
                            <i class="fas fa-tshirt"></i> View Outfit
                        </button>
                        <button class="tab-btn" onclick="viewBanner('${uid}')">
                            <i class="fas fa-image"></i> View Banner
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('resultContainer').innerHTML = html;
        }

        function calculateBRRank(points) {
            if (points >= 7000) return 'Grandmaster';
            if (points >= 6000) return 'Mythic';
            if (points >= 5000) return 'Heroic';
            if (points >= 4000) return 'Diamond';
            if (points >= 3000) return 'Platinum';
            if (points >= 2000) return 'Gold';
            if (points >= 1000) return 'Silver';
            return 'Bronze';
        }

        function calculateCSRank(points) {
            if (points >= 140) return 'Elite';
            if (points >= 120) return 'Gold III';
            if (points >= 100) return 'Gold II';
            if (points >= 80) return 'Gold I';
            if (points >= 60) return 'Silver II';
            if (points >= 40) return 'Silver I';
            if (points >= 20) return 'Bronze II';
            return 'Bronze I';
        }

        function getCreditStatus(score) {
            if (score >= 90) return '✨ Excellent';
            if (score >= 70) return '✓ Good';
            if (score >= 50) return '⚠ Fair';
            return '✗ Poor';
        }

        function formatDate(timestamp) {
            if (!timestamp || timestamp === '0') return 'N/A';
            return new Date(parseInt(timestamp) * 1000).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function viewOutfit(uid, region) {
            const regionLower = region.toLowerCase();
            const imgUrl = `https://silent-outfit-api.vercel.app/outfit-image?uid=${uid}&region=${regionLower}&key=SILENT`;
            const html = `
                <div class="player-card" style="margin-top: 20px;">
                    <h3 style="margin-bottom: 20px;"><i class="fas fa-tshirt"></i> Player Outfit</h3>
                    <div class="image-section">
                        <img src="${imgUrl}" alt="Player Outfit" onerror="this.src='https://via.placeholder.com/600x400?text=Outfit+Not+Found'">
                    </div>
                </div>
            `;
            document.getElementById('resultContainer').innerHTML += html;
        }

        function viewBanner(uid) {
            const imgUrl = `https://silent-banner-api.vercel.app/profile?uid=${uid}`;
            const html = `
                <div class="player-card" style="margin-top: 20px;">
                    <h3 style="margin-bottom: 20px;"><i class="fas fa-image"></i> Player Banner</h3>
                    <div class="image-section">
                        <img src="${imgUrl}" alt="Player Banner" onerror="this.src='https://via.placeholder.com/800x300?text=Banner+Not+Found'">
                    </div>
                </div>
            `;
            document.getElementById('resultContainer').innerHTML += html;
        }
    </script>
</body>
</html>
