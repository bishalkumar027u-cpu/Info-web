<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SILENT FF | Player Stats Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #fff;
        }

        /* Simple Gradient Background */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
        }

        /* Navbar */
        .navbar {
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 26, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
        }

        .logo i {
            color: #ff4757;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            opacity: 0.7;
            transition: 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
            color: #ff4757;
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 50px 20px 35px;
        }

        .hero h1 {
            font-size: 44px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ff4757);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .hero p {
            color: rgba(255,255,255,0.5);
            font-size: 16px;
        }

        /* Search Box */
        .search-container {
            max-width: 500px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 20px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .search-box button {
            background: #ff4757;
            border: none;
            padding: 10px 28px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-box button:hover {
            background: #ff6b81;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 24px;
            border-radius: 30px;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab-btn:hover {
            background: rgba(255,71,87,0.15);
            border-color: #ff4757;
        }

        .tab-btn.active {
            background: #ff4757;
            border-color: #ff4757;
        }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,71,87,0.2);
            border-top-color: #ff4757;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Cards */
        .result-card {
            max-width: 750px;
            margin: 0 auto 25px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .card-header {
            background: rgba(255,71,87,0.08);
            padding: 18px 22px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            color: #ff4757;
        }

        .card-sub {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 6px;
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
            padding: 20px;
        }

        .info-item {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 12px 15px;
        }

        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 15px;
            font-weight: 600;
            word-break: break-word;
        }

        /* Progress Bar */
        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            height: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            background: #ff4757;
            height: 100%;
            width: 0%;
            transition: width 0.4s;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
        .badge-success { background: rgba(0,255,136,0.15); color: #00ff88; }
        .badge-warning { background: rgba(255,165,0,0.15); color: #ffa502; }
        .badge-danger { background: rgba(255,71,87,0.15); color: #ff4757; }
        .badge-info { background: rgba(0,210,255,0.15); color: #00d2ff; }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            padding: 0 20px 20px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: #ff4757;
            color: #fff;
        }

        .btn-primary:hover {
            background: #ff6b81;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
        }

        .btn-outline:hover {
            border-color: #ff4757;
            background: rgba(255,71,87,0.1);
        }

        /* Token Form */
        .token-form {
            padding: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: rgba(255,255,255,0.7);
        }
        .input-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 15px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #ff4757;
        }
        .gen-btn {
            width: 100%;
            background: #ff4757;
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
        }
        .gen-btn:hover {
            background: #ff6b81;
        }

        /* JSON Pre */
        .json-pre {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 11px;
            font-family: monospace;
            color: #00ffaa;
            margin: 0 20px 20px;
        }

        /* Image Container */
        .img-container {
            padding: 20px;
            text-align: center;
        }
        .img-container img {
            max-width: 100%;
            border-radius: 16px;
        }
        .download-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            color: #fff;
            font-size: 12px;
            text-decoration: none;
        }
        .download-btn:hover {
            background: #ff4757;
        }

        /* Error */
        .error-msg {
            padding: 20px;
            background: rgba(255,71,87,0.1);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 16px;
            text-align: center;
            color: #ff6b81;
            margin: 20px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 40px;
        }

        .footer a {
            color: #ff4757;
            text-decoration: none;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .navbar { padding: 12px 20px; }
            .logo { font-size: 18px; }
            .hero h1 { font-size: 28px; }
            .info-grid { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-fire"></i> SILENT FF</div>
        <div class="nav-links">
            <a href="https://t.me/SILENT_GAM3R" target="_blank">Channel</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Free Fire Player Stats</h1>
        <p>Enter UID to get player info, ban status, token & more</p>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="uidInput" placeholder="Enter UID (e.g., 1576195175)" onkeypress="if(event.key==='Enter') searchPlayer()">
            <button onclick="searchPlayer()"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('info')">📊 Player Info</button>
        <button class="tab-btn" onclick="showTab('ban')">🛡️ Ban Check</button>
        <button class="tab-btn" onclick="showTab('token')">🔑 Token</button>
        <button class="tab-btn" onclick="showTab('outfit')">👕 Outfit</button>
        <button class="tab-btn" onclick="showTab('banner')">🖼️ Banner</button>
    </div>

    <div class="loader" id="loader"><div class="spinner"></div><p>Loading...</p></div>

    <div id="infoResult"></div>
    <div id="banResult" class="hidden"></div>
    <div id="tokenResult" class="hidden"></div>
    <div id="outfitResult" class="hidden"></div>
    <div id="bannerResult" class="hidden"></div>

    <div class="footer">
        <p>🔥 Powered by SILENT API | 📢 <a href="https://t.me/SILENT_GAM3R" target="_blank">@SILENT_GAM3R</a></p>
        <p>👨‍💻 Developer: <a href="https://t.me/SIL3NT_KILLER" target="_blank">@SIL3NT_KILLER</a></p>
    </div>

    <script>
        let currentUid = '';
        let currentRegion = 'ind';

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const tabs = ['info', 'ban', 'token', 'outfit', 'banner'];
            tabs.forEach(t => document.getElementById(t + 'Result').classList.add('hidden'));
            
            if(tab === 'info') document.querySelector('.tabs button:nth-child(1)').classList.add('active');
            if(tab === 'ban') document.querySelector('.tabs button:nth-child(2)').classList.add('active');
            if(tab === 'token') document.querySelector('.tabs button:nth-child(3)').classList.add('active');
            if(tab === 'outfit') document.querySelector('.tabs button:nth-child(4)').classList.add('active');
            if(tab === 'banner') document.querySelector('.tabs button:nth-child(5)').classList.add('active');
            
            document.getElementById(tab + 'Result').classList.remove('hidden');
            
            if(tab === 'ban' && currentUid) fetchBanCheck(currentUid);
            if(tab === 'token') showTokenForm();
            if(tab === 'outfit' && currentUid) fetchOutfit(currentUid, currentRegion);
            if(tab === 'banner' && currentUid) fetchBanner(currentUid);
        }

        async function searchPlayer() {
            const uid = document.getElementById('uidInput').value.trim();
            if(!uid) { showError('Enter UID', 'infoResult'); return; }
            if(!/^\d{8,11}$/.test(uid)) { showError('Invalid UID', 'infoResult'); return; }
            
            currentUid = uid;
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('infoResult');
            
            loader.classList.add('active');
            resultDiv.innerHTML = '';
            resultDiv.classList.remove('hidden');
            
            try {
                // Get region
                const regionRes = await fetch(`https://region-check-six.vercel.app/?uid=${uid}`);
                const regionData = await regionRes.json();
                currentRegion = (regionData.region || 'ind').toLowerCase();
                
                // Get player info
                const infoRes = await fetch(`https://mafuuuu-info-api.vercel.app/mafu-info?uid=${uid}`);
                const data = await infoRes.json();
                displayPlayerInfo(data, uid);
            } catch(err) {
                showError('Failed to fetch: ' + err.message, 'infoResult');
            } finally {
                loader.classList.remove('active');
            }
        }

        function displayPlayerInfo(data, uid) {
            const basic = data.basicInfo || {};
            const clan = data.clanBasicInfo || {};
            const credit = data.creditScoreInfo || {};
            const social = data.socialInfo || {};
            
            const name = basic.nickname || 'Unknown';
            const region = basic.region || 'N/A';
            const level = basic.level || 'N/A';
            const exp = basic.exp || '0';
            const likes = basic.liked || '0';
            const brPoints = basic.rankingPoints || '0';
            const csPoints = basic.csRankingPoints || '0';
            const creditScore = credit.creditScore || '0';
            const created = basic.createAt || '0';
            const signature = social.signature || 'No bio';
            const guild = clan.clanName || 'No Guild';
            
            // Ranks
            let brRank = 'Bronze';
            let br = parseInt(brPoints);
            if(br >= 1000) brRank = 'Silver';
            if(br >= 2000) brRank = 'Gold';
            if(br >= 3000) brRank = 'Platinum';
            if(br >= 4000) brRank = 'Diamond';
            if(br >= 5000) brRank = 'Heroic';
            if(br >= 6000) brRank = 'Mythic';
            if(br >= 7000) brRank = 'Grandmaster';
            
            let csRank = 'Bronze I';
            let cs = parseInt(csPoints);
            if(cs >= 20) csRank = 'Bronze II';
            if(cs >= 40) csRank = 'Silver I';
            if(cs >= 60) csRank = 'Silver II';
            if(cs >= 80) csRank = 'Gold I';
            if(cs >= 100) csRank = 'Gold II';
            if(cs >= 120) csRank = 'Gold III';
            if(cs >= 140) csRank = 'Elite';
            
            let creditClass = 'badge-danger';
            let creditText = 'Poor';
            if(creditScore >= 90) { creditClass = 'badge-success'; creditText = 'Excellent'; }
            else if(creditScore >= 70) { creditClass = 'badge-success'; creditText = 'Good'; }
            else if(creditScore >= 50) { creditClass = 'badge-warning'; creditText = 'Fair'; }
            
            const createdDate = (created && created !== '0') ? new Date(parseInt(created)*1000).toLocaleDateString() : 'N/A';
            const expProgress = (parseInt(exp) % 50000) / 50000 * 100;
            
            const html = `
                <div class="result-card">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-user"></i> ${escapeHtml(name)} <span class="badge badge-info">Level ${level}</span></div>
                        <div class="card-sub">📱 ${uid} | 🌍 ${region.toUpperCase()}</div>
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">🏆 BR RANK</div>
                            <div class="info-value">${brRank}</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(100, br/7000*100)}%"></div></div>
                            <div style="font-size:11px">${br.toLocaleString()} pts</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">🎮 CS RANK</div>
                            <div class="info-value">${csRank}</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${Math.min(100, cs/150*100)}%"></div></div>
                            <div style="font-size:11px">${cs.toLocaleString()} pts</div>
                        </div>
                        <div class="info-item"><div class="info-label">❤️ LIKES</div><div class="info-value">${parseInt(likes).toLocaleString()}</div></div>
                        <div class="info-item"><div class="info-label">💳 CREDIT</div><div class="info-value"><span class="badge ${creditClass}">${creditScore} (${creditText})</span></div></div>
                        <div class="info-item"><div class="info-label">📈 EXP</div><div class="info-value">${parseInt(exp).toLocaleString()} XP</div><div class="progress-bar"><div class="progress-fill" style="width: ${expProgress}%"></div></div></div>
                        <div class="info-item"><div class="info-label">📅 CREATED</div><div class="info-value">${createdDate}</div></div>
                        <div class="info-item"><div class="info-label">✍️ SIGNATURE</div><div class="info-value" style="font-size:13px">${escapeHtml(signature)}</div></div>
                        <div class="info-item"><div class="info-label">🏛️ GUILD</div><div class="info-value">${escapeHtml(guild)}</div></div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="showTab('outfit'); fetchOutfit('${uid}', '${region}')"><i class="fas fa-tshirt"></i> Outfit</button>
                        <button class="btn btn-outline" onclick="showTab('banner'); fetchBanner('${uid}')"><i class="fas fa-image"></i> Banner</button>
                    </div>
                </div>
            `;
            document.getElementById('infoResult').innerHTML = html;
        }

        async function fetchBanCheck(uid) {
            const container = document.getElementById('banResult');
            container.innerHTML = '<div class="loader active" style="padding:20px"><div class="spinner"></div></div>';
            
            try {
                const res = await fetch(`https://silent-bancheck-api.vercel.app/bancheck?uid=${uid}`);
                const data = await res.json();
                const isBanned = data.ban_status?.toLowerCase() !== 'not banned';
                container.innerHTML = `
                    <div class="result-card">
                        <div class="card-header"><div class="card-title"><i class="fas fa-shield-alt"></i> Ban Check Result</div></div>
                        <div class="info-grid">
                            <div class="info-item"><div class="info-label">Player</div><div class="info-value">${escapeHtml(data.nickname || 'N/A')}</div></div>
                            <div class="info-item"><div class="info-label">UID</div><div class="info-value">${uid}</div></div>
                            <div class="info-item"><div class="info-label">Region</div><div class="info-value">${(data.region || 'N/A').toUpperCase()}</div></div>
                            <div class="info-item"><div class="info-label">Status</div><div class="info-value"><span class="badge ${isBanned ? 'badge-danger' : 'badge-success'}">${isBanned ? '❌ BANNED' : '✅ NOT BANNED'}</span></div></div>
                            <div class="info-item"><div class="info-label">Ban Period</div><div class="info-value">${data.ban_period || 'N/A'}</div></div>
                        </div>
                    </div>
                `;
            } catch(e) {
                container.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
            }
        }

        function showTokenForm() {
            const container = document.getElementById('tokenResult');
            container.innerHTML = `
                <div class="result-card">
                    <div class="card-header"><div class="card-title"><i class="fas fa-key"></i> JWT Token Generator</div></div>
                    <div class="token-form">
                        <div class="input-group"><label>UID</label><input type="text" id="tokenUid" placeholder="Enter UID"></div>
                        <div class="input-group"><label>Password</label><input type="password" id="tokenPass" placeholder="Enter Password"></div>
                        <button class="gen-btn" onclick="generateToken()">Generate Token</button>
                    </div>
                    <div id="tokenOutput"></div>
                </div>
            `;
        }

        async function generateToken() {
            const uid = document.getElementById('tokenUid')?.value.trim();
            const pass = document.getElementById('tokenPass')?.value.trim();
            const output = document.getElementById('tokenOutput');
            if(!uid || !pass) { output.innerHTML = '<div class="error-msg">Enter UID and Password</div>'; return; }
            output.innerHTML = '<div class="loader active" style="padding:20px"><div class="spinner"></div></div>';
            
            try {
                const res = await fetch(`https://uid-password-to-jwt-f1uw.vercel.app/token?uid=${uid}&password=${encodeURIComponent(pass)}`);
                const data = await res.json();
                output.innerHTML = `<div class="json-pre">${JSON.stringify(data, null, 2)}</div>`;
            } catch(e) {
                output.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
            }
        }

        async function fetchOutfit(uid, region) {
            const container = document.getElementById('outfitResult');
            const regionLower = region.toLowerCase();
            const imgUrl = `https://silent-outfit-api.vercel.app/outfit-image?uid=${uid}&region=${regionLower}&key=SILENT`;
            container.innerHTML = `
                <div class="result-card">
                    <div class="card-header"><div class="card-title"><i class="fas fa-tshirt"></i> Player Outfit</div><div class="card-sub">UID: ${uid} | Region: ${regionUpper}</div></div>
                    <div class="img-container">
                        <img src="${imgUrl}" onerror="this.src='https://placehold.co/500x300/1a1a2e/ff4757?text=Outfit+Not+Found'">
                        <a href="${imgUrl}" download="outfit_${uid}.jpg" class="download-btn"><i class="fas fa-download"></i> Download</a>
                    </div>
                </div>
            `;
        }

        async function fetchBanner(uid) {
            const container = document.getElementById('bannerResult');
            const imgUrl = `https://banner-views-pink.vercel.app/profile?uid=${uid}`;
            container.innerHTML = `
                <div class="result-card">
                    <div class="card-header"><div class="card-title"><i class="fas fa-image"></i> Player Banner</div><div class="card-sub">UID: ${uid}</div></div>
                    <div class="img-container">
                        <img src="${imgUrl}" onerror="this.src='https://placehold.co/800x300/1a1a2e/ff4757?text=Banner+Not+Found'">
                        <a href="${imgUrl}" download="banner_${uid}.jpg" class="download-btn"><i class="fas fa-download"></i> Download</a>
                    </div>
                </div>
            `;
        }

        function showError(msg, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="error-msg">⚠️ ${escapeHtml(msg)}</div>`;
            setTimeout(() => { if(container.innerHTML.includes(msg)) container.innerHTML = ''; }, 4000);
        }

        function escapeHtml(str) {
            if(!str) return '';
            return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
        }
    </script>
</body>
</html>
